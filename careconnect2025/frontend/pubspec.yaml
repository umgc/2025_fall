name: care_connect_app
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.2

# Dependencies specify other packages that your package needs in order to work.
dependencies:
  flutter_chat_core: ^2.0.0
  flutter_chat_ui: ^2.0.0
  uuid: ^4.2.1
  file_picker: ^10.3.3
  path: ^1.9.1
  shared_preferences: ^2.5.3
  dio: ^5.9.0
  cookie_jar: ^4.0.8
  dio_cookie_manager: ^3.3.0
  confetti: ^0.8.0
  url_launcher: ^6.3.2  # For OAuth redirects
  crypto: ^3.0.6        # For generating state parameter
  pointycastle: ^4.0.0  # For RSA key operations
  app_links: ^6.4.1     # For handling deep links from OAuth callback (replaced uni_links)

  # -- Astha - start
  path_provider: ^2.1.5
  mime: ^2.0.0
  image_picker: ^1.2.0
  # jitsi_meet_flutter_sdk: ^11.4.0   # (temporarily disabled for faster builds)
  permission_handler: ^12.0.1
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2
  camera: ^0.11.1
  pdf: ^3.11.3

  # firebase_* and mlkit packages temporarily disabled for faster builds

  # Agora / WebRTC temporarily commented out
  # agora_rtc_engine: ^6.5.2
  # flutter_webrtc: ^1.2.0
  # socket_io_client: ^3.1.2

  # telephony: ^0.2.0+1  # Temporarily disabled due to namespace issue

  platform: ^3.1.6
  sqflite: ^2.4.2
  provider: ^6.1.5+1
  go_router: ^16.2.1
  geolocator: ^14.0.2
  google_maps_flutter: ^2.13.1
  fl_chart: ^1.1.0

  # AI Voice Commands
  porcupine_flutter: ^3.0.5
  speech_to_text: ^7.3.0

  # device integration
  fitbitter: ^2.0.6
  health: ^13.2.0
  mobile_scanner: ^7.0.1
  share_plus: ^12.0.0

  cupertino_icons: ^1.0.8
  http: ^1.5.0
  universal_html: ^2.2.4
  flutter_secure_storage: ^9.2.4

  # Flutter SDK as a dependency
  flutter:
    sdk: flutter

  flutter_svg: ^2.0.9
  web: ^1.1.0

  # speech to text, voice recognition, and diarization
  sherpa_onnx: ^1.12.14
  record: ^6.1.1
  new_simple_audio_trimmer: ^0.1.5
  table_calendar: ^3.2.0

  # Team D - Dependencies Begin
  syncfusion_flutter_pdfviewer: ^31.2.3
  qr_flutter: ^4.1.0
  http_parser: ^4.0.2
  image: ^4.2.0
  json_schema: ^5.2.1
  flutter_staggered_grid_view: ^0.7.0
  excel: ^4.0.6
  open_filex: ^4.7.0
  connectivity_plus: ^6.0.5
  device_info_plus: ^12.1.0
  flutter_local_notifications: ^17.2.1
  # Team D - Dependencies End

dependency_overrides:
  calendar_view: ^1.0.0
  accordion: ^2.6.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  mockito: ^5.5.1
  build_runner: ^2.4.9
  flutter_launcher_icons: ^0.14.1
  flutter_native_splash: ^2.4.0
  flutter_lints: ^6.0.0

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/images/banner.png
    - assets/images/app_icon.png
    - assets/sherpa-onnx-streaming-zipformer-en-2023-06-26/
    - assets/sherpa-onnx-pyannote-segmentation-3-0/
    - assets/3dspeaker_speech_eres2net_base_sv_zh-cn_3dspeaker_16k.onnx
    - assets/sherpa-onnx-zipformer-gigaspeech-2023-12-12/
    - assets/images/CareConnectLogo.png
    - assets/images/CareConnectLogo.svg
    - assets/images/default_avatar.svg

# Splash Screen configuration
flutter_native_splash:
  color: "#ffffff"
  image: assets/images/app_icon.png
  android: true
  web: true
  ios: true
  android_12:
    image: assets/images/app_icon.png
    icon_background_color: "#ffffff"

# Flutter Launcher Icons Configuration
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/app_icon.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/images/app_icon.png"
  remove_alpha_ios: true
  min_sdk_android: 21
  web:
    generate: true
    image_path: "assets/images/app_icon.png"
  windows:
    generate: true
    image_path: "assets/images/app_icon.png"
  macos:
    generate: true
    image_path: "assets/images/app_icon.png"
