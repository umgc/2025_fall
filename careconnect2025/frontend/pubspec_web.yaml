name: care_connect_app
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  
  # Web-compatible packages only
  http: ^1.5.0
  shared_preferences: ^2.5.3
  provider: ^6.1.5+1
  go_router: ^16.2.1
  flutter_dotenv: ^6.0.0
  intl: ^0.20.2
  universal_html: ^2.2.4
  web: ^1.1.0
  
  # UI packages
  fl_chart: ^1.1.0
  table_calendar: ^3.2.0
  confetti: ^0.8.0
  
  # Utilities
  crypto: ^3.0.6
  mime: ^2.0.0
  path: ^1.9.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  assets:
    - assets/images/banner.png
    - assets/images/app_icon.png
    - .env
  uses-material-design: true