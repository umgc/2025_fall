# Unit Test Configuration - Isolated test environment for unit tests
# This file is used specifically for unit tests and does not interfere with integration tests
spring.application.name=careconnect-backend

# In-memory H2 database for tests
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA configuration for tests
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.defer-datasource-initialization=true

# Disable Flyway for tests
spring.flyway.enabled=false

# Test logging configuration
logging.level.root=ERROR
logging.level.com.careconnect=INFO
logging.level.org.springframework=ERROR
logging.level.org.hibernate=ERROR

# Disable banner
spring.main.banner-mode=off

# Required properties for conditional beans
careconnect.openai.enabled=true
careconnect.openai.api-key=test-key
careconnect.deepseek.enabled=true
careconnect.deepseek.api-key=test-key
careconnect.deepseek.base-url=https://api.test.com
careconnect.aws.enabled=true
careconnect.aws.region=us-east-1
careconnect.aws.access-key-id=test
careconnect.aws.secret-access-key=test
careconnect.database.use-aws-config=true

# JWT configuration for tests
security.jwt.secret=test-secret-key-for-testing-only-minimum-256-bits-required
jwt.expiration.ms=10800000

# Email configuration for tests
careconnect.email.provider=console
careconnect.email.from=test@example.com

# Frontend URL for tests
frontend.base-url=http://localhost:3000

# Disable management endpoints for tests
management.endpoints.enabled-by-default=false

# Test profile specific settings - profile is activated by @ActiveProfiles annotation