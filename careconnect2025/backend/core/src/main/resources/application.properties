# ===============================================================
# ==            PRODUCTION APPLICATION PROPERTIES              ==
# ===============================================================

spring.application.name=careconnect

# --- General Server and Logging ---
server.port=${PORT:8080}
logging.level.root=INFO
logging.level.com.careconnect=INFO
spring.main.banner-mode=off

# --- Production Database Configuration (via AWS Parameter Store for PostgreSQL) ---
# Enable the custom DatabaseConfig to fetch credentials from AWS SSM
careconnect.database.use-aws-config=true

# These values are the NAMES of the parameters to fetch from AWS SSM Parameter Store
careconnect.db.url=careconnect.db.url
careconnect.db.username=careconnect.db.username
careconnect.db.password=careconnect.db.password

# --- JPA & Hibernate for Production (PostgreSQL) ---
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# --- Enable Production Services ---
careconnect.aws.enabled=true
careconnect.stripe.enabled=true
careconnect.openai.enabled=true
careconnect.deepseek.enabled=false

# --- URLs (to be provided by environment variables) ---
frontend.base-url=${APP_FRONTEND_BASE_URL}
careconnect.baseurl=${BASE_URL}
careconnect.cors_allowed=${CORS_ALLOWED_LIST}

# --- Secrets & API Keys (to be provided by environment variables) ---
# JWT Secret
security.jwt.secret=${SECURITY_JWT_SECRET}
jwt.expiration.ms=${JWT_EXPIRATION:10800000}

# Stripe
stripe.secret-key=${STRIPE_SECRET_KEY}
stripe.webhook-secret=${STRIPE_WEBHOOK_SIGNING_SECRET}

# OpenAI / Spring AI
openai.api-key=${OPENAI_API_KEY}
spring.ai.openai.api-key=${OPENAI_API_KEY}
spring.ai.openai.chat.options.model=gpt-4

# Email (SendGrid)
careconnect.email.provider=sendgrid
careconnect.email.from=${FROM_EMAIL}
careconnect.email.sendgrid.api-key=${SENDGRID_API_KEY}

# OAuth2 Credentials
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.fitbit.client-id=${FITBIT_CLIENT_ID}
spring.security.oauth2.client.registration.fitbit.client-secret=${FITBIT_CLIENT_SECRET}

# Firebase
firebase.project-id=${FIREBASE_PROJECT_ID}
firebase.service-account-key=${FIREBASE_SERVICE_ACCOUNT_KEY}
firebase.sender-id=${FIREBASE_SENDER_ID}

# S3 File Storage
app.file.storage.use-s3=true
app.file.storage.default=s3
aws.s3.bucket=${S3_BUCKET_NAME}
aws.s3.region=${AWS_DEFAULT_REGION}

# File Upload Sizes
spring.servlet.multipart.max-file-size=25MB
spring.servlet.multipart.max-request-size=30MB