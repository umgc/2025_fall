name: Build Lambda ZIP and upload to S3

on:
  push:
    branches: [ "main" ]
    tags:
      - "v*.*.*"
  workflow_dispatch:

env:
  JAVA_VERSION: "17"
  AWS_REGION: "us-east-1"
  # need to find the correct folder name that step function is looking for. 
  S3_PREFIX: "lambda/${{ github.repository }}/${{ github.ref_name }}/${{ github.sha }}"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Temurin JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven

      - name: Build with Maven (skip tests)
        run: mvn -B -DskipTests package

      - name: Locate built ZIP
        id: zip
        run: |
          set -e
          # If your ZIP has a known pattern, set it explicitly to avoid ambiguity, e.g.:
          # ZIP_PATH="$(ls -1 target/my-fn-*.zip | head -n 1)"
          ZIP_PATH="$(ls -1 target/*.zip | head -n 1)"
          if [ -z "$ZIP_PATH" ]; then
            echo "No ZIP found in target/. Ensure your build outputs a .zip there."
            exit 1
          fi
          echo "zip_path=$ZIP_PATH" >> "$GITHUB_OUTPUT"
          echo "zip_name=$(basename "$ZIP_PATH")" >> "$GITHUB_OUTPUT"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: ${{ steps.zip.outputs.zip_path }}
          if-no-files-found: error

  upload-to-s3:
    needs: build
    runs-on: ubuntu-latest
    if: |
      github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: build-output
          path: dist

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }} 
      - name: Upload to S3 with original filename
        env:
          BUCKET: ${{ secrets.S3_BUCKET }}
          PREFIX: ${{ env.S3_PREFIX }}
        run: |
          set -e
          ZIP_PATH="$(ls -1 dist/*.zip | head -n 1)"
          ZIP_NAME="$(basename "$ZIP_PATH")"
          echo "Uploading $ZIP_NAME to s3://${BUCKET}/${PREFIX}/$ZIP_NAME"
          aws s3 cp "$ZIP_PATH" "s3://${BUCKET}/${PREFIX}/$ZIP_NAME"
