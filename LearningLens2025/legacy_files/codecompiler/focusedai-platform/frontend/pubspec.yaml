# pubspec.yaml
name: focusedai_teacher
description: FocusEd AI Teacher Grading System - Educational code execution and grading platform

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  archive: ^3.4.10
  path: ^1.8.3
  
  # State Management
  provider: ^6.1.1
  
  # HTTP & API
  http: ^1.1.0
  dio: ^5.3.2
  
  # UI & Design
  cupertino_icons: ^1.0.2
  google_fonts: ^6.1.0
  flutter_svg: ^2.0.9
  
  # Code Editor
  flutter_code_editor: ^0.3.0
  highlight: ^0.7.0
  code_text_field: ^1.1.0
  
  # File Handling
  file_picker: ^6.1.1
  path_provider: ^2.1.1
  
  # CSV Export
  csv: ^6.0.0
  
  # Web utilities
  url_launcher: ^6.3.0
  
  # Utilities
  intl: ^0.18.1
  shared_preferences: ^2.2.2
  uuid: ^4.1.0
  
  # Charts & Analytics
  fl_chart: ^0.65.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  
