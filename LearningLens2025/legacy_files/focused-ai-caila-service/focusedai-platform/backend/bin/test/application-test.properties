# src/test/resources/application-test.properties
# Test configuration for FocusedAI Backend

# Lambda URLs for testing (mock endpoints)
lambda.java-url=http://localhost:8081/mock/java
lambda.python-url=http://localhost:8081/mock/python
lambda.javascript-url=http://localhost:8081/mock/javascript
lambda.cpp-url=http://localhost:8081/mock/cpp

# Timeout configuration for tests
lambda.timeout.seconds=30
lambda.batch.timeout.seconds=120

# JWT configuration for tests
jwt.secret=test-secret-key-that-is-long-enough-for-hmac-sha256-algorithm
encryption.key=test-encryption-key-32-chars!!

# Logging for tests
logging.level.com.focusedai=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.test=DEBUG