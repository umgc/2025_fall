name: teacher_grading_system
description: Flutter web application for automated code grading

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # HTTP and API communication
  http: ^1.4.0
  http_parser: ^4.1.2
  
  # File handling
  file_picker: ^10.2.0
  file_saver: ^0.3.0
  
  # UI and Material Design
  cupertino_icons: ^1.0.2
  
  # Utilities
  uuid: ^4.5.1
  dotted_border: ^3.1.0
  archive: ^4.0.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
