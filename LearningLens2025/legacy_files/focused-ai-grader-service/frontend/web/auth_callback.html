<!DOCTYPE html>
<html>
<head>
    <title>Authentication Callback</title>
    <style>
        body { 
            font-family: Arial, sans-serif; 
            text-align: center; 
            padding: 50px; 
        }
    </style>
</head>
<body>
    <h2>Processing authentication...</h2>
    <div id="status">Exchanging authorization code...</div>

    <script>
        console.log('Callback page loaded');
        console.log('URL:', window.location.href);
        
        const urlParams = new URLSearchParams(window.location.search);
        const code = urlParams.get('code');
        const error = urlParams.get('error');
        const statusDiv = document.getElementById('status');

        if (error) {
            statusDiv.textContent = `Error: ${error}`;
            if (window.opener) {
                window.opener.postMessage(JSON.stringify({
                    type: 'auth_error',
                    error: error
                }), '*');
            }
        } else if (code) {
            statusDiv.textContent = 'Getting access token...';
            
            // YOUR ACTUAL CREDENTIALS HERE - replace these values
            const clientId = '51530330417-a5kp7dl5rmasfh9748nh30ie3eaj3b45.apps.googleusercontent.com';
            const clientSecret = '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';
            
            console.log('Using client ID:', clientId);
            
            fetch('https://oauth2.googleapis.com/token', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/x-www-form-urlencoded',
                },
                body: new URLSearchParams({
                    client_id: clientId,
                    client_secret: clientSecret,
                    code: code,
                    grant_type: 'authorization_code',
                    redirect_uri: 'http://localhost:3000/auth_callback.html'
                })
            })
            .then(response => {
                console.log('Token response status:', response.status);
                return response.json();
            })
            .then(data => {
                console.log('Token response data:', data);
                if (data.access_token) {
                    statusDiv.textContent = 'Success! Closing window...';
                    if (window.opener) {
                        window.opener.postMessage(JSON.stringify({
                            type: 'auth_success',
                            access_token: data.access_token,
                            refresh_token: data.refresh_token
                        }), '*');
                    }
                    setTimeout(() => window.close(), 1000);
                } else {
                    statusDiv.textContent = `Error: ${data.error || 'Failed to get token'}`;
                    console.error('Token error:', data);
                }
            })
            .catch(error => {
                statusDiv.textContent = `Network error: ${error.message}`;
                console.error('Fetch error:', error);
            });
        }
    </script>
</body>
</html>
