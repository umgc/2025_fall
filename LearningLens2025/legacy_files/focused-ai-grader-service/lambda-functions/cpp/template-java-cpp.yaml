AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: FocusEd AI Java and C++ Code Execution Lambda Functions

Resources:
  # Java Executor
  JavaExecutor:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: focusedai-java-executor
      PackageType: Image
      ImageConfig:
        Command: ["JavaExecutor::handleRequest"]
      Timeout: 120
      MemorySize: 1024
      FunctionUrlConfig:
        AuthType: NONE
        Cors:
          AllowOrigins: ["*"]
          AllowMethods: ["POST"]
          AllowHeaders: ["*"]
    Metadata:
      DockerTag: java17-v1
      DockerContext: ./java
      Dockerfile: Dockerfile

  # C++ Executor
  CppExecutor:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: focusedai-cpp-executor
      PackageType: Image
      ImageConfig:
        Command: ["cpp-executor"]
      Timeout: 120
      MemorySize: 1024
      FunctionUrlConfig:
        AuthType: NONE
        Cors:
          AllowOrigins: ["*"]
          AllowMethods: ["POST"]
          AllowHeaders: ["*"]
    Metadata:
      DockerTag: cpp-v1
      DockerContext: ./cpp
      Dockerfile: Dockerfile

Outputs:
  JavaExecutorUrl:
    Description: "Java Executor Function URL"
    Value: !GetAtt JavaExecutorUrl.FunctionUrl
    
  CppExecutorUrl:
    Description: "C++ Executor Function URL"
    Value: !GetAtt CppExecutorUrl.FunctionUrl
