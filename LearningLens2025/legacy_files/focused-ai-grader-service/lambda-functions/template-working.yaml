AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: FocusEd AI Code Execution Lambda Functions - Working Languages

Resources:
  # Python Executor
  PythonExecutor:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: focusedai-python-executor
      PackageType: Image
      ImageConfig:
        Command: ["lambda_function.lambda_handler"]
      FunctionUrlConfig:
        AuthType: NONE
        Cors:
          AllowOrigins: ["*"]
          AllowMethods: ["POST"]
          AllowHeaders: ["*"]
    Metadata:
      DockerTag: python3.9-v1
      DockerContext: ./python
      Dockerfile: Dockerfile

  # JavaScript Executor  
  JavaScriptExecutor:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: focusedai-javascript-executor
      PackageType: Image
      ImageConfig:
        Command: ["index.handler"]
      FunctionUrlConfig:
        AuthType: NONE
        Cors:
          AllowOrigins: ["*"]
          AllowMethods: ["POST"]
          AllowHeaders: ["*"]
    Metadata:
      DockerTag: nodejs18-v1
      DockerContext: ./javascript
      Dockerfile: Dockerfile

Outputs:
  PythonExecutorUrl:
    Description: "Python Executor Function URL"
    Value: !GetAtt PythonExecutorUrl.FunctionUrl
    
  JavaScriptExecutorUrl:
    Description: "JavaScript Executor Function URL"
    Value: !GetAtt JavaScriptExecutorUrl.FunctionUrl
