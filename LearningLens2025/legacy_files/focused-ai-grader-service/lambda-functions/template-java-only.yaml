AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: FocusEd AI Java Code Execution Lambda Function

Resources:
  JavaExecutor:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: focusedai-java-executor
      PackageType: Image
      ImageConfig:
        Command: ["JavaExecutor::handleRequest"]
      Timeout: 120
      MemorySize: 1024
      Environment:
        Variables:
          JAVA_TOOL_OPTIONS: "-XX:+TieredCompilation -XX:TieredStopAtLevel=1"
      FunctionUrlConfig:
        AuthType: NONE
        Cors:
          AllowOrigins: ["*"]
          AllowMethods: ["POST"]
          AllowHeaders: ["*"]
    Metadata:
      DockerTag: java11-v1
      DockerContext: ./java
      Dockerfile: Dockerfile

Outputs:
  JavaExecutorUrl:
    Description: "Java Executor Function URL"
    Value: !GetAtt JavaExecutorUrl.FunctionUrl
