# Spring Boot Configuration
spring.application.name=teacher-grading-system

# Lambda Function URLs
lambda.python.url=https://bm24ekxzany4wm62yen2aqzlxe0reunf.lambda-url.us-east-1.on.aws/
lambda.javascript.url=https://4hraqyhrojosh2cx7qtiatebim0ysogb.lambda-url.us-east-1.on.aws/
# lambda.java.url=https://bj5dwa6zjiyty5qrmorg4mip3q0qqumq.lambda-url.us-east-1.on.aws/
lambda.java.url=https://xwvunfec7yql2xxqpirpa5iq440bxsjs.lambda-url.us-east-1.on.aws
lambda.cpp.url=https://g6tjiseruxw5qbqdfhzbplgdom0kpijk.lambda-url.us-east-1.on.aws/
lambda.timeout.seconds=90

# Server Configuration
server.port=8080

# CORS Configuration (if needed)
management.endpoints.web.exposure.include=health,info
spring.web.cors.allowed-origins=http://localhost:3000
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.web.cors.allowed-headers=*
spring.web.cors.allow-credentials=true

# Batch Processing Configuration
lambda.batch.timeout.seconds=300
spring.mvc.async.request-timeout=900000

# Thread Pool Configuration for Parallel Execution
spring.task.execution.pool.core-size=10
spring.task.execution.pool.max-size=50
spring.task.execution.pool.queue-capacity=100
spring.task.execution.thread-name-prefix=batch-exec-

# File Upload Configuration
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB